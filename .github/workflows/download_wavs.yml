---
name: Download WAVs

on:
  push:
    branches:
      - main
    paths:
      - output/csv/training_3s_samples.csv
      - output/csv/testing_60s_samples.csv
  workflow_dispatch:

concurrency:
  group: download-wavs-cache-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  download_wavs:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    env:
      WAV_CACHE_BRANCH: wav-cache
      WAV_CACHE_PATH: wav-cache

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            *.archive.ubuntu.com:80
            *.microsoft.com:443
            api.github.com:443
            audio-orcasound-net.s3.amazonaws.com:443
            dl.google.com:443
            esm.ubuntu.com:443
            files.pythonhosted.org:443
            github.com:443
            pypi.org:443
            s3-us-west-2.amazonaws.com:443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - id: detect
        name: Detect sample CSV changes
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > changed_files.txt
          cat changed_files.txt
          should_run=false
          if grep -Eq '^output/csv/training_3s_samples\.csv$|^output/csv/testing_60s_samples\.csv$' changed_files.txt; then
            should_run=true
          fi
          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"

      - name: Checkout WAV cache branch
        if: steps.detect.outputs.should_run == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          path: ${{ env.WAV_CACHE_PATH }}
          ref: ${{ env.WAV_CACHE_BRANCH }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.detect.outputs.should_run == 'true'
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        if: steps.detect.outputs.should_run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        if: steps.detect.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Run download_wavs.py
        if: steps.detect.outputs.should_run == 'true'
        env:
          WAV_WORKTREE_DIR: ${{ github.workspace }}/${{ env.WAV_CACHE_PATH }}
          WAV_CACHE_DIR: ${{ github.workspace }}/${{ env.WAV_CACHE_PATH }}
        run: python src/download_wavs.py

      - name: Commit and push WAV cache updates
        if: steps.detect.outputs.should_run == 'true'
        run: |
          if [ -z "$(git -C "${WAV_CACHE_PATH}" status --porcelain output/wav output/testing-wav)" ]; then
            echo "No WAV cache changes detected."
            exit 0
          fi

          git -C "${WAV_CACHE_PATH}" config user.name "github-actions[bot]"
          git -C "${WAV_CACHE_PATH}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${WAV_CACHE_PATH}" add output/wav output/testing-wav
          git -C "${WAV_CACHE_PATH}" commit -m "Update cached WAV files from ${GITHUB_SHA}"
          git -C "${WAV_CACHE_PATH}" push origin "HEAD:${WAV_CACHE_BRANCH}"

      - name: Skip notice
        if: steps.detect.outputs.should_run != 'true'
        run: echo "No training_3s_samples.csv/testing_60s_samples.csv changes; skipping download_wavs.py"
