    runs-on: windows-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            *.microsoft.com:443
            *.microsoft.com:80
            api.github.com:443
            au.download.windowsupdate.com:80
            audio-orcasound-net.s3.amazonaws.com:443
            community.chocolatey.org:443
            dc.services.visualstudio.com:443
            download.windowsupdate.com:80
            files.pythonhosted.org:443
            github.com:443
            incoming.telemetry.mozilla.org:443
            login.live.com:443
            ocsp.digicert.com:80
            ocsp.sectigo.com:80
            packages.chocolatey.org:443
            pypi.org:443
            s3-us-west-2.amazonaws.com:443
            telemetry-incoming.r53-2.services.mozilla.com:443
            trainedproductionmodels.blob.core.windows.net:443

      - id: skip_check
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf  # v5.3.1
        with:
