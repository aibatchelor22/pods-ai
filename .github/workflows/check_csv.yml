---
name: Check CSV

on:
  workflow_dispatch:

concurrency:
  # Cancel any CI/CD workflow currently in progress for the same PR.
  # Allow running concurrently with any other commits.
  group: build-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect_merge_inputs:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    outputs:
      should_run_base_csv: ${{ steps.detect.outputs.should_run_base_csv }}
      should_run_make_csv: ${{ steps.detect.outputs.should_run_make_csv }}
      should_run_merge: ${{ steps.detect.outputs.should_run_merge }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - id: detect
        name: Detect CSV workflow changes
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "should_run_base_csv=true" >> "$GITHUB_OUTPUT"
            echo "should_run_make_csv=true" >> "$GITHUB_OUTPUT"
            echo "should_run_merge=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" > changed_files.txt
          cat changed_files.txt
          base_csv_inputs=(
            '^bootstrap/src/make_csv.py$'
            '^bootstrap/src/extract_training_samples.py$'
            '^bootstrap/src/process_humpback_wavs.py$'
            '^bootstrap/csv/detections.csv$'
            '^bootstrap/csv/manual_timestamps.csv$'
            '^bootstrap/csv/initial_training_samples.csv$'
            '^bootstrap/csv/testing_samples.csv$'
            '^requirements.txt$'
            '^\.github/workflows/check_csv.yml$'
          )
          make_csv_inputs=(
            '^bootstrap/src/make_csv.py$'
            '^bootstrap/csv/detections.csv$'
            '^requirements.txt$'
            '^\.github/workflows/check_csv.yml$'
          )
          merge_inputs=(
            '^bootstrap/src/extract_training_samples.py$'
            '^bootstrap/src/merge_training_samples.py$'
            '^bootstrap/csv/initial_training_samples.csv$'
            '^bootstrap/csv/manual_samples.csv$'
            '^bootstrap/csv/manual_timestamps.csv$'
            '^bootstrap/csv/training_samples.csv$'
            '^requirements.txt$'
            '^\.github/workflows/check_csv.yml$'
          )
          should_run_base_csv=false
          for pattern in "${base_csv_inputs[@]}"; do
            if grep -Eq "$pattern" changed_files.txt; then
              should_run_base_csv=true
              break
            fi
          done
          should_run_make_csv=false
          for pattern in "${make_csv_inputs[@]}"; do
            if grep -Eq "$pattern" changed_files.txt; then
              should_run_make_csv=true
              break
            fi
          done
          should_run_merge=false
          for pattern in "${merge_inputs[@]}"; do
            if grep -Eq "$pattern" changed_files.txt; then
              should_run_merge=true
              break
            fi
          done
          echo "should_run_base_csv=$should_run_base_csv" >> "$GITHUB_OUTPUT"
          echo "should_run_make_csv=$should_run_make_csv" >> "$GITHUB_OUTPUT"
          echo "should_run_merge=$should_run_merge" >> "$GITHUB_OUTPUT"

  make_csv_ubuntu:
    needs: detect_merge_inputs
    if: github.actor != 'dependabot[bot]' && needs.detect_merge_inputs.outputs.should_run_base_csv == 'true'
    permissions:
      actions: write  # for fkirc/skip-duplicate-actions to skip or stop workflow runs
      contents: read  # for actions/checkout to fetch code
    runs-on: ubuntu-latest
    env:
      COSMOS_KEY: ${{ secrets.COSMOS_KEY }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            *.archive.ubuntu.com:80
            security.ubuntu.com:443
            *.microsoft.com:443
            aifororcasmetadatastore-westus2.documents.azure.com:443
            aifororcasmetadatastore.documents.azure.com:443
            api.github.com:443
            archive.ubuntu.com:443
            audio-orcasound-net.s3.amazonaws.com:443
            dl.google.com:443
            esm.ubuntu.com:443
            files.pythonhosted.org:443
            github.com:443
            live.orcasound.net:443
            pypi.org:443
            s3-us-west-2.amazonaws.com:443
            trainedproductionmodels.blob.core.windows.net:443

      - id: skip_check
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf  # v5.3.1
        with:
          cancel_others: 'false'

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        if: steps.skip_check.outputs.should_skip != 'true'
        with:
          submodules: 'recursive'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.skip_check.outputs.should_skip != 'true'
        with:
          python-version: '3.14'

      - name: Install FFmpeg
        if: steps.skip_check.outputs.should_skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        if: steps.skip_check.outputs.should_skip != 'true'
        run: pip install -r requirements.txt

      - name: Patch fastai_audio for Python 3.11+ compatibility
        if: steps.skip_check.outputs.should_skip != 'true'
        run: bash patch_fastai_audio.sh

      - name: Make CSV
        if: steps.skip_check.outputs.should_skip != 'true' && needs.detect_merge_inputs.outputs.should_run_make_csv == 'true' && env.COSMOS_KEY != ''
        run: |
          python bootstrap/src/make_csv.py --end 2026_03_17_00_00_00_PST

      - name: Verify there are no changes in detections.csv
        if: steps.skip_check.outputs.should_skip != 'true' && needs.detect_merge_inputs.outputs.should_run_make_csv == 'true'
        run: |
          git diff --exit-code

      - name: Process humpback wavs
        if: steps.skip_check.outputs.should_skip != 'true'
        run: |
          python bootstrap/src/process_humpback_wavs.py

      - name: Extract training samples
        if: steps.skip_check.outputs.should_skip != 'true'
        run: |
          python bootstrap/src/extract_training_samples.py

      - name: Verify there are no changes in initial_training_samples.csv or testing_samples.csv
        if: steps.skip_check.outputs.should_skip != 'true'
        run: |
          git diff --exit-code


