        with:
          egress-policy: block
          allowed-endpoints: >
            *.microsoft.com:443
            *.microsoft.com:80
            adl.windows.com:80
            aifororcasmetadatastore-westus2.documents.azure.com:443
            aifororcasmetadatastore.documents.azure.com:443
            api.github.com:443
            audio-orcasound-net.s3.amazonaws.com:443
            client.wns.windows.com:443
            community.chocolatey.org:443
            dc.services.visualstudio.com:443
            dns.msftncsi.com:443
            ecs.office.com:443
            files.pythonhosted.org:443
            github.com:443
            incoming.telemetry.mozilla.org:443
            live.orcasound.net:443
            login.live.com:443
            ocsp.digicert.com:80
            ocsp.sectigo.com:80
            packages.chocolatey.org:443
            pypi.org:443
            s3-us-west-2.amazonaws.com:443
            telemetry-incoming.r53-2.services.mozilla.com:443
            trainedproductionmodels.blob.core.windows.net:443

      - id: skip_check
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf  # v5.3.1
        with:
          cancel_others: 'false'

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        if: steps.skip_check.outputs.should_skip != 'true'
        with:
          submodules: 'recursive'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.skip_check.outputs.should_skip != 'true'
        with:
          python-version: '3.14'

      - name: Install FFmpeg
        if: steps.skip_check.outputs.should_skip != 'true'
        run: choco install ffmpeg -y

      - name: Install Python dependencies
        if: steps.skip_check.outputs.should_skip != 'true'
        run: pip install -r requirements.txt

      - name: Patch fastai_audio for Python 3.11+ compatibility
        if: steps.skip_check.outputs.should_skip != 'true'
        shell: cmd
        run: patch_fastai_audio.bat

      - name: Make CSV
        if: steps.skip_check.outputs.should_skip != 'true' && needs.detect_merge_inputs.outputs.should_run_make_csv == 'true' && env.COSMOS_KEY != ''
        run: |
          python bootstrap/src/make_csv.py --end 2026_03_17_00_00_00_PST

      - name: Verify there are no changes in detections.csv
        if: steps.skip_check.outputs.should_skip != 'true' && needs.detect_merge_inputs.outputs.should_run_make_csv == 'true'
        run: |
          git diff --exit-code

      - name: Process humpback wavs
        if: steps.skip_check.outputs.should_skip != 'true'
        run: |
          python bootstrap/src/process_humpback_wavs.py

      - name: Extract training samples
        if: steps.skip_check.outputs.should_skip != 'true'
        run: |
          python bootstrap/src/extract_training_samples.py

      - name: Verify there are no changes in initial_training_samples.csv or testing_samples.csv
        if: steps.skip_check.outputs.should_skip != 'true'
        run: |
          git diff --exit-code


  merge_training_ubuntu:
    needs: detect_merge_inputs
    if: github.actor != 'dependabot[bot]' && needs.detect_merge_inputs.outputs.should_run_merge == 'true'
    permissions:
      actions: write  # for fkirc/skip-duplicate-actions to skip or stop workflow runs
      contents: read  # for actions/checkout to fetch code
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            *.archive.ubuntu.com:80
            security.ubuntu.com:443
            *.microsoft.com:443
            api.github.com:443
            audio-orcasound-net.s3.amazonaws.com:443
            dl.google.com:443
            esm.ubuntu.com:443
            files.pythonhosted.org:443
            github.com:443
            pypi.org:443
            s3-us-west-2.amazonaws.com:443
            trainedproductionmodels.blob.core.windows.net:443

      - id: skip_check
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf  # v5.3.1
        with:
          cancel_others: 'false'

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        if: steps.skip_check.outputs.should_skip != 'true'
        with:
          submodules: 'recursive'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.skip_check.outputs.should_skip != 'true'
        with:
          python-version: '3.14'

      - name: Install FFmpeg
        if: steps.skip_check.outputs.should_skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        if: steps.skip_check.outputs.should_skip != 'true'
        run: pip install -r requirements.txt

      - name: Patch fastai_audio for Python 3.11+ compatibility
        if: steps.skip_check.outputs.should_skip != 'true'
