---
name: Train Model

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Number of training epochs'
        required: false
        default: '5'
        type: string
      batch_size:
        description: 'Training batch size'
        required: false
        default: '8'
        type: string
      output_dir:
        description: 'Output directory for the trained model'
        required: false
        default: 'model/multiclass'
        type: string
      hub_model_id:
        description: 'HuggingFace Hub model ID (e.g., username/model-name)'
        required: false
        default: 'davethaler/whale-call-detector'
        type: string
      push_to_hub:
        description: 'Push trained model to HuggingFace Hub'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  train_model:
    runs-on: ubuntu-latest
    env:
      COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          submodules: 'recursive'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.14'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download WAV files
        run: |
          python src/download_wavs.py

      - name: Train model
        run: >
          python src/train_podsai_model.py
          --output_dir ${{ inputs.output_dir }}
          --epochs ${{ inputs.epochs }}
          --batch_size ${{ inputs.batch_size }}
          ${{ inputs.push_to_hub && '--push_to_hub' || '' }}
          ${{ inputs.push_to_hub && format('--hub_model_id {0}', inputs.hub_model_id) || '' }}
