---
name: Run Tests

on:
  pull_request:
  workflow_dispatch:

concurrency:
  # Cancel any CI/CD workflow currently in progress for the same PR.
  # Allow running concurrently with any other commits.
  group: tests-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run_tests_ubuntu:
    if: github.actor != 'dependabot[bot]'
    permissions:
      actions: write  # for fkirc/skip-duplicate-actions to skip or stop workflow runs
      contents: read  # for actions/checkout to fetch code
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            *.archive.ubuntu.com:80
            security.ubuntu.com:443
            *.microsoft.com:443
            api.github.com:443
            audio-orcasound-net.s3.amazonaws.com:443
            cas-server.xethub.hf.co:443
            dl.google.com:443
            esm.ubuntu.com:443
            files.pythonhosted.org:443
            github.com:443
            huggingface.co:443
            pypi.org:443
            s3-us-west-2.amazonaws.com:443
            trainedproductionmodels.blob.core.windows.net:443
            transfer.xethub.hf.co:443
            us.aws.cdn.hf.co:443

      - id: skip_check
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf  # v5.3.1
        with:
          cancel_others: 'false'
          paths: '["requirements.txt", "output/csv/**", "bootstrap/src/**", "bootstrap/csv/**", "tests/**", "src/**", ".github/workflows/run_tests.yml"]'

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        if: steps.skip_check.outputs.should_skip != 'true'
        with:
          submodules: 'recursive'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.skip_check.outputs.should_skip != 'true'
        with:
          python-version: '3.14'

      - name: Install FFmpeg
        if: steps.skip_check.outputs.should_skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        if: steps.skip_check.outputs.should_skip != 'true'
        run: pip install -r requirements.txt

      - name: Patch fastai_audio for Python 3.11+ compatibility
        if: steps.skip_check.outputs.should_skip != 'true'
        run: bash patch_fastai_audio.sh

      - name: Download FastAI model
        if: steps.skip_check.outputs.should_skip != 'true'
        run: |
          mkdir -p model
          curl -o model.zip https://trainedproductionmodels.blob.core.windows.net/dnnmodel/11-15-20.FastAI.R1-12.zip
          unzip model.zip -d .

      - name: Run unit tests
        if: steps.skip_check.outputs.should_skip != 'true'
        run: |
          python -m pytest tests/ -v -s


  run_tests_windows:
    if: github.actor != 'dependabot[bot]'
    permissions:
      actions: write  # for fkirc/skip-duplicate-actions to skip or stop workflow runs
      contents: read  # for actions/checkout to fetch code
    runs-on: windows-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            *.microsoft.com:443
            *.microsoft.com:80
            adl.windows.com:80
            api.github.com:443
            au.download.windowsupdate.com:80
            audio-orcasound-net.s3.amazonaws.com:443
            cas-server.xethub.hf.co:443
            client.wns.windows.com:443
            community.chocolatey.org:443
            dc.services.visualstudio.com:443
            download.windowsupdate.com:80
            files.pythonhosted.org:443
            github.com:443
            huggingface.co:443
            incoming.telemetry.mozilla.org:443
            login.live.com:443
            ocsp.digicert.com:80
            ocsp.r2m02.amazontrust.com:80
            ocsp.r2m04.amazontrust.com:80
            ocsp.sectigo.com:80
            packages.chocolatey.org:443
            pypi.org:443
            s3-us-west-2.amazonaws.com:443
            telemetry-incoming.r53-2.services.mozilla.com:443
            time.windows.com:443
            trainedproductionmodels.blob.core.windows.net:443
            transfer.xethub.hf.co:443
            us.aws.cdn.hf.co:443

      - id: skip_check
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf  # v5.3.1
        with:
          cancel_others: 'false'
          paths: '["requirements.txt", "output/csv/**", "bootstrap/src/**", "bootstrap/csv/**", "tests/**", "src/**", ".github/workflows/run_tests.yml"]'

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        if: steps.skip_check.outputs.should_skip != 'true'
        with:
          submodules: 'recursive'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.skip_check.outputs.should_skip != 'true'
        with:
          python-version: '3.14'

      - name: Install FFmpeg
        if: steps.skip_check.outputs.should_skip != 'true'
        run: choco install ffmpeg -y

      - name: Install Python dependencies
        if: steps.skip_check.outputs.should_skip != 'true'
        run: pip install -r requirements.txt

      - name: Patch fastai_audio for Python 3.11+ compatibility
        if: steps.skip_check.outputs.should_skip != 'true'
        shell: cmd
        run: patch_fastai_audio.bat

      - name: Download FastAI model
        if: steps.skip_check.outputs.should_skip != 'true'
        run: |
          New-Item -ItemType Directory -Force -Path model
          Invoke-WebRequest -Uri https://trainedproductionmodels.blob.core.windows.net/dnnmodel/11-15-20.FastAI.R1-12.zip -OutFile model.zip
          Expand-Archive -Path model.zip -DestinationPath . -Force

      - name: Run unit tests
        if: steps.skip_check.outputs.should_skip != 'true'
        run: |
          python -m pytest tests/ -v -s
