---
name: LiveInferenceSystem-deploy-configmaps

on:
  push:
    branches:
      - main
    paths:
      # Only andrews-bay is deployed to AKS for now (testing phase).
      # Add more locations here once side-by-side testing with OrcaHello is complete.
      - 'LiveInferenceSystem/deploy/andrews-bay-configmap.yaml'
  workflow_dispatch:  # Allow manual workflow invocation from the Github Actions UI

concurrency:
  # Cancel any CI/CD workflow currently in progress for the same PR.
  # Allow running concurrently with any other commits.
  group: LiveInferenceSystem-deploy-configmaps-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-configmaps:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 2

      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d  # v5.1.0

      - name: Set Kubernetes context
        uses: azure/k8s-set-context@8698eba2499e9012f0d5085f8798077cce4bc526  # v5.0.1
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Get configmap files to apply
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # For manual triggers, apply only the currently-enabled location(s).
            # Other locations exist in the repo but are not yet deployed to AKS.
            CHANGED=$(ls LiveInferenceSystem/deploy/andrews-bay-configmap.yaml 2>/dev/null || true)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'LiveInferenceSystem/deploy/andrews-bay-configmap.yaml')
          fi
          echo "files=$CHANGED" >> $GITHUB_OUTPUT

      - name: Apply configmaps and restart deployments
        run: |
          CHANGED="${{ steps.changed-files.outputs.files }}"
          if [ -z "$CHANGED" ]; then
            echo "No configmap files to apply."
            exit 0
          fi
          for FILE in $CHANGED; do
            echo "Applying $FILE"
            kubectl apply -f "$FILE"
            # Derive namespace from filename, e.g. LiveInferenceSystem/deploy/bush-point-configmap.yaml -> bush-point
            FILENAME=$(basename "$FILE")
            NAMESPACE=${FILENAME%-configmap.yaml}
            echo "Restarting deployment/pods-ai-inference-system in namespace $NAMESPACE"
            kubectl rollout restart deployment/pods-ai-inference-system -n "$NAMESPACE"
          done
